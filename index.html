<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SIPAS KKG PJOK SD KECAMATAN TANJUNG</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="sidebar">
  <h2>SIPAS KKG PJOK</h2>
  <button>Dashboard</button>
  <button>Surat</button>
  <button>Arsip</button>
  <button>Pengaturan</button>
</div>
<div class="content">
  <div id="loginPage">
  <img src="logo.png" class="logo">

  <h2>SIPAS KKG PJOK</h2>

  <input
    type="email"
    id="email"
    placeholder="Email">

  <input
    type="password"
    id="password"
    placeholder="Password">

  <button onclick="login()">
    Masuk
  </button>
</div>
<button onclick="logout()">
Logout
</button>
<div id="app" style="display:none;">
</div>
  <h1>SIPAS KKG PJOK SD KECAMATAN TANJUNG</h1>
  <div class="card">Dashboard siap dihubungkan ke Supabase.</div>
</div>
<script src="app.js"></script>
</body>
</html>
