<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIAP TANJUNG</title>
  <link rel="stylesheet" href="assets/style.css?v=20260622">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-page">
  <div class="login-card">
    <div class="brand-logo-wrap">
      <img src="logo.png" class="login-logo" alt="Logo"
        onerror="this.style.display='none';document.getElementById('loginLogoFallback').style.display='grid'">
      <div id="loginLogoFallback" class="logo-fallback" style="display:none">S</div>
    </div>

    <h1 style="font-size:15px; line-height:1.2;">
      <span style="white-space:nowrap;">SISTEM INFORMASI ADMINISTRASI</span><br>
      PAGORA TANJUNG
    </h1>

    <label>Email</label>
    <input type="email" id="email" placeholder="Masukkan email">

    <label>Password</label>
    <input type="password" id="password" placeholder="Masukkan password">

    <button onclick="doLogin()" class="btn-login">Masuk</button>
    <div id="loginError" class="error-message"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app-shell" style="display:none;">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="logo.png" class="sidebar-logo" alt="Logo">
      <div>
        <h2>SIAP TANJUNG</h2>
        <p id="sidebarProfileName">Sistem Administrasi Surat</p>
      </div>
    </div>

    <nav class="menu-list">
      <button onclick="navigate('dashboard')">Dashboard</button>
      <button onclick="navigate('masuk')">Surat Masuk</button>
      <button onclick="navigate('keluar')">Surat Keluar</button>
      <button onclick="navigate('tugas')">Surat Tugas</button>
      <button onclick="navigate('undangan')">Undangan</button>
      <button onclick="navigate('sk')">SK</button>
      <button onclick="navigate('arsip')">Arsip</button>
      <button onclick="navigate('pengaturan')">Pengaturan</button>
    </nav>

    <div class="user-panel">
      <strong id="currentUserEmail">-</strong>
      <span id="currentUserRole">-</span>
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>
  </aside>

  <main class="content">

    <div class="topbar">
      <div>
        <h1 id="pageTitle">Dashboard</h1>
        <p id="pageSubtitle">Sistem Informasi Administrasi Pagora Tanjung.</p>
      </div>
    </div>

    <section id="toast" class="toast" hidden></section>
    <section id="pageContent"></section>

    <!-- =======================
         🔥 TAMBAHAN: TEMBUSAN SETTINGS
         ======================= -->
    <section id="tembusanSettings" class="panel" style="margin-top:20px; display:none;">
      <div class="panel-header">
        <div>
          <h2>Pengaturan Tembusan</h2>
          <p>Isi daftar tembusan default (pisahkan dengan koma).</p>
        </div>
      </div>

      <div class="form-grid">
        <div class="field full">
          <label>Daftar Tembusan Global</label>
          <textarea id="tembusanGlobal"
                    name="tembusan"
                    rows="4"
                    placeholder="Contoh: Kepala Dinas, Direktur PT, Arsip"></textarea>
        </div>
      </div>
    </section>

  </main>
</div>

<!-- PREVIEW -->
<div id="previewModal" class="modal" hidden>
  <div class="modal-card modal-wide">
    <div class="modal-header">
      <h2>Preview Dokumen</h2>
      <button onclick="closePreview()">×</button>
    </div>

    <div id="previewContent" class="preview-content"></div>

    <div class="modal-footer">
      <button onclick="printPreview()">Cetak</button>
      <button onclick="downloadPreviewPdf()">Download PDF</button>
    </div>
  </div>
</div>

<!-- EDIT -->
<div id="editModal" class="modal" hidden>
  <div class="modal-card">
    <div class="modal-header">
      <h2 id="editModalTitle">Edit Dokumen</h2>
      <button onclick="closeEditModal()">×</button>
    </div>
    <div id="editModalContent" class="modal-scroll"></div>
  </div>
</div>

<script src="assets/app.js?v=20260622"></script>

</body>
</html>
