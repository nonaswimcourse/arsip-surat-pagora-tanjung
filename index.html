<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIAP TANJUNG</title>
  <link rel="stylesheet" href="assets/style.css?v=20260622">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div id="loginPage" class="login-page">
    <div class="login-card">
      <div class="brand-logo-wrap">
        <img src="logo.png" class="login-logo" alt="Logo" onerror="this.style.display='none';document.getElementById('loginLogoFallback').style.display='grid'">
        <div id="loginLogoFallback" class="logo-fallback" style="display:none">S</div>
      </div>
  <h1 style="font-size:15px; line-height:1.2;">
    <span style="white-space:nowrap;">
        SISTEM INFORMASI ADMINISTRASI
    </span>
    <br>
    PAGORA TANJUNG
</h1>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Masukkan email" autocomplete="email">

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password">

      <button onclick="doLogin()" class="btn-login">Masuk</button>
      <div id="loginError" class="error-message"></div>

    </div>
  </div>

  <div id="app" class="app-shell" style="display:none;">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="logo.png" class="sidebar-logo" alt="Logo" onerror="this.style.display='none';document.getElementById('sidebarLogoFallback').style.display='grid'">
        <div id="sidebarLogoFallback" class="logo-fallback small" style="display:none">S</div>
        <div>
          <h2>SIAP TANJUNG</h2>
          <p id="sidebarProfileName">Sistem Administrasi Surat</p>
        </div>
      </div>

      <nav class="menu-list" aria-label="Menu utama">
        <button class="menu-item active" data-route="dashboard" onclick="navigate('dashboard')"><span>▦</span>Dashboard</button>
        <button class="menu-item" data-route="masuk" onclick="navigate('masuk')"><span>↙</span>Surat Masuk</button>
        <button class="menu-item" data-route="keluar" onclick="navigate('keluar')"><span>↗</span>Surat Keluar</button>
        <button class="menu-item" data-route="tugas" onclick="navigate('tugas')"><span>✓</span>Surat Tugas</button>
        <button class="menu-item" data-route="undangan" onclick="navigate('undangan')"><span>✉</span>Undangan</button>
        <button class="menu-item" data-route="sk" onclick="navigate('sk')"><span>§</span>SK</button>
        <button class="menu-item" data-route="arsip" onclick="navigate('arsip')"><span>▣</span>Arsip</button>
        <button class="menu-item" data-route="pengaturan" onclick="navigate('pengaturan')"><span>⚙</span>Pengaturan</button>
      </nav>

      <div class="user-panel">
        <strong id="currentUserEmail">-</strong>
        <span id="currentUserRole">-</span>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </aside>

    <main class="content">
      <div class="topbar">
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSubtitle">Sistem Informasi Administrasi Pagora Tanjung.</p>
        </div>
        <div class="topbar-actions">
          <button class="btn secondary" onclick="refreshCurrentPage()">Muat Ulang</button>
          <button class="btn" onclick="navigate('keluar')">Buat Surat</button>
        </div>
      </div>

      <section id="toast" class="toast" hidden></section>
      <section id="pageContent"></section>
    </main>
  </div>

  <div id="previewModal" class="modal" hidden>
    <div class="modal-card modal-wide">
      <div class="modal-header">
        <h2>Preview Dokumen</h2>
        <button class="icon-btn" onclick="closePreview()">×</button>
      </div>
      <div id="previewContent" class="preview-content"></div>
      <div class="modal-footer">
        <button class="btn secondary" onclick="printPreview()">Cetak</button>
        <button class="btn" onclick="downloadPreviewPdf()">Download PDF</button>
      </div>
    </div>
  </div>

  <div id="editModal" class="modal" hidden>
    <div class="modal-card modal-form">
      <div class="modal-header">
        <h2 id="editModalTitle">Edit Dokumen</h2>
        <button class="icon-btn" onclick="closeEditModal()">×</button>
      </div>
      <div id="editModalContent" class="modal-scroll"></div>
    </div>
  </div>

  <script src="assets/app.js?v=20260622"></script>
</body>
</html>
